<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Mix Mapper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>Music Mix Mapper</h1>
        <label for="fileInput">Upload MP3</label>
        <input id="fileInput" type="file" accept=".mp3,audio/mpeg" />
        <button id="playPauseBtn" type="button" disabled>Play</button>
        <label for="panScaleSlider" class="ctrl-label">Pan Scale</label>
        <span class="slider-row">
          <button class="nudge-btn" data-target="panScaleSlider" data-dir="-1" tabindex="-1" aria-label="Decrease pan scale">−</button>
          <input id="panScaleSlider" type="range" min="0.10" max="0.80" value="0.14" step="0.01" class="ctrl-slider" aria-label="Pan scale sensitivity" />
          <button class="nudge-btn" data-target="panScaleSlider" data-dir="1" tabindex="-1" aria-label="Increase pan scale">+</button>
        </span>
        <input id="panScaleValue" type="number" min="0.10" max="0.80" step="0.01" value="0.14" class="ctrl-value-input" aria-label="Pan scale value" />
        <label for="lineAlphaSlider" class="ctrl-label">Line Alpha</label>
        <span class="slider-row">
          <button class="nudge-btn" data-target="lineAlphaSlider" data-dir="-1" tabindex="-1" aria-label="Decrease line alpha">−</button>
          <input id="lineAlphaSlider" type="range" min="0" max="1" value="0.85" step="0.01" class="ctrl-slider" aria-label="Waveform line alpha" />
          <button class="nudge-btn" data-target="lineAlphaSlider" data-dir="1" tabindex="-1" aria-label="Increase line alpha">+</button>
        </span>
        <input id="lineAlphaValue" type="number" min="0" max="1" step="0.01" value="0.85" class="ctrl-value-input" aria-label="Line alpha value" />
        <label for="lineThicknessSlider" class="ctrl-label">Line Thickness</label>
        <span class="slider-row">
          <button class="nudge-btn" data-target="lineThicknessSlider" data-dir="-1" tabindex="-1" aria-label="Decrease line thickness">−</button>
          <input id="lineThicknessSlider" type="range" min="0.01" max="1.0" value="0.70" step="0.01" class="ctrl-slider" aria-label="Waveform line thickness" />
          <button class="nudge-btn" data-target="lineThicknessSlider" data-dir="1" tabindex="-1" aria-label="Increase line thickness">+</button>
        </span>
        <input id="lineThicknessValue" type="number" min="0.01" max="1.0" step="0.01" value="0.70" class="ctrl-value-input" aria-label="Line thickness value" />
        <label for="bassCurveSlider" class="ctrl-label">Bass Curve</label>
        <span class="slider-row">
          <button class="nudge-btn" data-target="bassCurveSlider" data-dir="-1" tabindex="-1" aria-label="Decrease bass curve">−</button>
          <input id="bassCurveSlider" type="range" min="0.50" max="3.00" value="2.70" step="0.1" class="ctrl-slider" aria-label="Bass height curve exponent" />
          <button class="nudge-btn" data-target="bassCurveSlider" data-dir="1" tabindex="-1" aria-label="Increase bass curve">+</button>
        </span>
        <input id="bassCurveValue" type="number" min="0.50" max="3.00" step="0.1" value="2.70" class="ctrl-value-input" aria-label="Bass curve value" />
        <label for="trebleCurveSlider" class="ctrl-label">Treble Curve</label>
        <span class="slider-row">
          <button class="nudge-btn" data-target="trebleCurveSlider" data-dir="-1" tabindex="-1" aria-label="Decrease treble curve">−</button>
          <input id="trebleCurveSlider" type="range" min="0.20" max="2.70" value="0.50" step="0.1" class="ctrl-slider" aria-label="Treble height curve exponent" />
          <button class="nudge-btn" data-target="trebleCurveSlider" data-dir="1" tabindex="-1" aria-label="Increase treble curve">+</button>
        </span>
        <input id="trebleCurveValue" type="number" min="0.20" max="2.70" step="0.1" value="0.50" class="ctrl-value-input" aria-label="Treble curve value" />
      </section>
      <section class="seekbar">
        <span id="currentTime">0:00</span>
        <span class="slider-row seek-row">
          <button class="nudge-btn" data-target="seekSlider" data-dir="-1" tabindex="-1" aria-label="Seek back">−</button>
          <input id="seekSlider" type="range" min="0" max="100" value="0" step="0.1" disabled aria-label="Seek" />
          <button class="nudge-btn" data-target="seekSlider" data-dir="1" tabindex="-1" aria-label="Seek forward">+</button>
        </span>
        <span id="totalTime">0:00</span>
      </section>
      <canvas id="vizCanvas" role="img" aria-label="Music Mix Mapper Visualizer">
        Circular visualization of MP3 frequency and stereo pan content.
      </canvas>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
