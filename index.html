<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Mix Mapper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>Music Mix Mapper</h1>
        <label for="fileInput">Upload MP3</label>
        <input id="fileInput" type="file" accept=".mp3,audio/mpeg" />
        <button id="playPauseBtn" type="button" disabled>Play</button>
      </section>
      <section class="seekbar">
        <span id="currentTime">0:00</span>
        <input id="seekSlider" type="range" min="0" max="100" value="0" step="0.1" disabled aria-label="Seek" />
        <span id="totalTime">0:00</span>
      </section>
      <canvas id="vizCanvas" role="img" aria-label="Music Mix Mapper Visualizer">
        Circular visualization of MP3 frequency and stereo pan content.
      </canvas>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
